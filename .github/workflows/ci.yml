name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

      - name: Run shellcheck on managed scripts
        run: |
          set -euo pipefail
          find automation -type f \( -name '*.sh' -o -path '*/scripts/*' \) -print0 | xargs -0 -r shellcheck

      - name: Run Ansible syntax checks
        working-directory: automation/ansible
        run: |
          set -euo pipefail
          ansible-playbook -i inventories/lab/hosts.yml playbooks/deploy-minecraft.yml --limit media1 --syntax-check
          ansible-playbook -i inventories/lab/hosts.yml playbooks/diagnose-minecraft.yml --limit media1 --syntax-check
          ansible-playbook -i inventories/lab/hosts.yml playbooks/deploy-job-scraper.yml --limit media1 --syntax-check
          ansible-playbook -i inventories/lab/hosts.yml playbooks/set-identity.yml --syntax-check